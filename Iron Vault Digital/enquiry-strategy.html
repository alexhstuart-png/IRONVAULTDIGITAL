.check-label input[type="checkbox"] {
    -webkit-appearance: checkbox;
    display: inline-block;
    width: auto;
    height: auto;
    margin: 0;
    padding: 0;
}

.check-label input[type="checkbox":checked] {
    background-color: #4caf50;
}

.check-label input[type="checkbox"]:focus {
    outline: none;
}
