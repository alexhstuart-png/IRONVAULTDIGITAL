*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--white);font-family:var(--sans);font-weight:300;line-height:1.65;min-height:100svh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

.tag{font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:1.25rem}
h1{font-family:var(--serif);font-size:clamp(2.4rem,5vw,3.5rem);line-height:.95;margin-bottom:1.25rem}
h1 em{font-style:italic;color:var(--gold)}
p{font-size:.95rem;color:var(--muted);line-height:1.75;max-width:40ch;margin:0 auto 2rem}
.btn{display:inline-flex;align-items:center;font-family:var(--sans);font-weight:500;font-size:.8125rem;letter-spacing:.09em;text-transform:uppercase;padding:.85rem 1.75rem;text-decoration:none;background:var(--gold);color:#000;transition:background .2s,transform .2s}
.btn:hover{background:var(--gold-hi);transform:translateY(-2px)}
footer{padding:2rem clamp(1.25rem,4vw,3.5rem);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem}
